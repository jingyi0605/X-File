name: desktop-build-and-release

# X-File 桌面打包 + 发布 CI。
# 参考 CodingNS .github/workflows/desktop-release.yml（去掉 Android，工具链对齐 X-File，新增 dev 通道）。
# 触发：push tag v*（如 v0.1.0 / v0.1.0-dev.1）或手动 workflow_dispatch。
# 通道由 VERSION 文件的 semver prerelease 后缀决定：含 -（如 -dev.1）→ dev 通道；不含 → stable 通道。

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"

jobs:
  build-macos-universal:
    name: macos-universal-release
    runs-on: macos-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install workspace dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: 导入 Apple 签名证书
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_CERTIFICATE_P12_BASE64}" || -z "${APPLE_CERTIFICATE_PASSWORD}" || -z "${APPLE_KEYCHAIN_PASSWORD}" ]]; then
            echo "缺少 macOS 签名 secrets，请检查 APPLE_CERTIFICATE_P12_BASE64 / APPLE_CERTIFICATE_PASSWORD / APPLE_KEYCHAIN_PASSWORD" >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/x-file-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/x-file-signing.keychain-db"
          export CERT_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_BASE64"])
          )
          PY

          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${APPLE_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: 构建并签名公证 macOS 安装包
        # build-macos.sh 检测到 APPLE_SIGN_IDENTITY 后会自动接 release-macos.sh 完成签名 + 公证。
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          X_FILE_UPDATER_PUBLIC_KEY: ${{ secrets.X_FILE_UPDATER_PUBLIC_KEY }}
          X_FILE_UPDATER_ENDPOINT: ${{ vars.X_FILE_UPDATER_ENDPOINT }}
          X_FILE_REQUIRE_RELEASE_SECRETS: "1"
        shell: bash
        run: bash scripts/build-macos.sh

      - name: 验证 macOS 发布 DMG
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="apps/desktop/src-tauri/target/release/macos-release/X-File.dmg"
          mount_dir="$RUNNER_TEMP/x-file-release-dmg"
          expected_version="$(tr -d '[:space:]' < VERSION)"

          if [[ -z "$expected_version" ]]; then
            echo "VERSION 文件为空，无法校验 DMG 版本" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$expected_version" ]]; then
              echo "Git tag 与仓库版本不一致：tag=$tag_version version=$expected_version" >&2
              exit 1
            fi
          fi

          rm -rf "$mount_dir"
          mkdir -p "$mount_dir"

          hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse
          trap 'hdiutil detach "$mount_dir" -quiet || true' EXIT

          if [[ ! -d "$mount_dir/X-File.app" ]]; then
            echo "DMG 中缺少 X-File.app" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$mount_dir/X-File.app"

          actual_version="$(
            /usr/libexec/PlistBuddy \
              -c "Print :CFBundleShortVersionString" \
              "$mount_dir/X-File.app/Contents/Info.plist"
          )"

          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "DMG 中应用版本不匹配：expected=$expected_version actual=$actual_version" >&2
            exit 1
          fi

          echo "DMG 校验通过：version=$actual_version"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-universal
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/macos-release/X-File.dmg
            apps/desktop/src-tauri/target/release/macos-release/X-File.app
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.sig

  build-windows:
    name: windows-installers
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install workspace dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build Windows installers
        # build-windows.sh 检测到 Windows 环境后按 VERSION prerelease 后缀切 bundles：
        # 预发布版（含 -）只产 NSIS exe；稳定版产 MSI + NSIS。
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          X_FILE_UPDATER_PUBLIC_KEY: ${{ secrets.X_FILE_UPDATER_PUBLIC_KEY }}
          X_FILE_UPDATER_ENDPOINT: ${{ vars.X_FILE_UPDATER_ENDPOINT }}
          X_FILE_REQUIRE_RELEASE_SECRETS: "1"
        shell: bash
        run: bash scripts/build-windows.sh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig

      - name: 校验 Windows 产物符合版本通道
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          bundle_root="apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          msi_dir="${bundle_root}/msi"
          nsis_dir="${bundle_root}/nsis"
          msi_count="0"
          exe_count="0"

          if [[ -d "${msi_dir}" ]]; then
            msi_count="$(find "${msi_dir}" -maxdepth 1 -type f -name '*.msi' | wc -l | tr -d '[:space:]')"
          fi

          if [[ -d "${nsis_dir}" ]]; then
            exe_count="$(find "${nsis_dir}" -maxdepth 1 -type f -name '*.exe' | wc -l | tr -d '[:space:]')"
          fi

          if [[ "${exe_count}" -eq 0 ]]; then
            echo "Windows 构建没有产出 NSIS 安装包" >&2
            exit 1
          fi

          if [[ "$version" == *-* ]]; then
            if [[ "${msi_count}" -ne 0 ]]; then
              echo "预发布版本 ${version} 不应产出 MSI" >&2
              exit 1
            fi
            echo "预发布版本 ${version} 校验通过：仅产出 NSIS。"
          else
            if [[ "${msi_count}" -eq 0 ]]; then
              echo "稳定版 ${version} 必须产出 MSI" >&2
              exit 1
            fi
            echo "稳定版 ${version} 校验通过：同时产出 MSI 和 NSIS。"
          fi

  publish-release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos-universal
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          version="$(tr -d '[:space:]' < VERSION)"
          is_prerelease="false"
          if [[ "$version" == *-* ]]; then
            is_prerelease="true"
          fi

          if ! gh release view "${tag_name}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${tag_name}" \
              --repo "${GH_REPO}" \
              --title "${tag_name}" \
              --notes "X-File ${tag_name} 桌面发布产物。" \
              --prerelease="${is_prerelease}"
          else
            gh release edit "${tag_name}" --repo "${GH_REPO}" --prerelease="${is_prerelease}"
          fi

      - name: 生成桌面 updater latest.json
        # 聚合各平台 .sig 签名内容 + 版本 tag 的 release asset URL，产出 Tauri updater 格式 manifest。
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ["GH_REPO"]
          tag_name = os.environ["GITHUB_REF_NAME"]
          release_assets = Path("release-assets")

          mac_updates = sorted(release_assets.rglob("*.app.tar.gz"))
          mac_sigs = sorted(release_assets.rglob("*.app.tar.gz.sig"))
          win_updates = [
              path for path in sorted(release_assets.rglob("*.exe"))
              if not path.name.endswith(".sig")
          ]
          win_sigs = sorted(release_assets.rglob("*.exe.sig"))

          if not mac_updates or not mac_sigs or not win_updates or not win_sigs:
              raise SystemExit("缺少桌面 updater 产物，无法生成 latest.json")

          release_info = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "release",
                      "view",
                      tag_name,
                      "--repo",
                      repo,
                      "--json",
                      "body,publishedAt",
                  ],
                  text=True,
              )
          )

          version = tag_name[1:] if tag_name.startswith("v") else tag_name

          def asset_url(path: Path) -> str:
              return f"https://github.com/{repo}/releases/download/{tag_name}/{path.name}"

          manifest = {
              "version": version,
              "notes": release_info.get("body") or "",
              "pub_date": release_info.get("publishedAt"),
              "platforms": {
                  "macos-universal": {
                      "signature": mac_sigs[0].read_text(encoding="utf-8").strip(),
                      "url": asset_url(mac_updates[0]),
                  },
                  "windows-x86_64": {
                      "signature": win_sigs[0].read_text(encoding="utf-8").strip(),
                      "url": asset_url(win_updates[0]),
                  },
              },
          }

          (release_assets / "latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print("latest.json 生成完成")
          PY

      - name: 上传 Release 资产到版本 tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"

          mapfile -d "" files < <(
            find release-assets -type f \
              \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.sig" -o -name "*.tar.gz" -o -name "latest.json" \) \
              -print0
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were found." >&2
            exit 1
          fi

          gh release upload "${tag_name}" "${files[@]}" --repo "${GH_REPO}" --clobber

      - name: 维护 dev 通道滚动 release（dev-latest）
        # dev 版时：维护 dev-latest 滚动 release，上传 latest.json 作为指针。
        # dev 通道客户端查 releases/download/dev-latest/latest.json，其中的 url 指向版本 tag 的安装包。
        # stable 版时：GitHub releases/latest 自动指向最新正式版，无需维护 dev-latest。
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"

          if [[ "$version" != *-* ]]; then
            echo "稳定版 ${version}：GitHub releases/latest 自动指向，无需维护 dev-latest。"
            exit 0
          fi

          echo "开发版 ${version}：维护 dev-latest 滚动 release。"
          gh release delete dev-latest --yes --cleanup-tag --repo "${GH_REPO}" || true
          gh release create dev-latest \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "开发版（最新）" \
            --notes "X-File 最新开发版自动更新清单指针。安装包在对应版本 tag 的 release 下。" \
            --repo "${GH_REPO}"
          gh release upload dev-latest release-assets/latest.json --repo "${GH_REPO}" --clobber
          echo "dev-latest 已更新，dev 通道客户端将查到版本 ${version}。"
