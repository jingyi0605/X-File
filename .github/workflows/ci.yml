name: ci

# X-File PR 检查：TS 类型检查 + Web 单元测试 + 共享包/前后端构建。
# Rust 桌面壳的编译由 desktop-release.yml 在 tag 时跨平台验证，这里不重复（避免 PR 耗时）。
# better-sqlite3 原生模块在 pnpm install 时按 onlyBuiltDependencies 编译，ubuntu-latest 自带 python + 构建工具。

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"

jobs:
  typecheck-test-build:
    name: typecheck-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck（全仓 TS）
        run: pnpm typecheck

      - name: Web 单元测试
        run: pnpm --filter @x-file/web test

      - name: 构建共享包与前后端
        run: |
          pnpm --filter @x-file/shared build
          pnpm --filter @x-file/indexer build
          pnpm --filter @x-file/server build
          pnpm --filter @x-file/web build
