name: X-File Windows 实机构建

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Windows 实机 runner 标签"
        required: true
        default: "x-file-windows"
      upload_artifacts:
        description: "是否上传本次构建产物"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  windows-tauri-build:
    name: Windows Tauri build
    runs-on:
      - self-hosted
      - Windows
      - ${{ inputs.runner_label }}
    timeout-minutes: 60
    env:
      X_FILE_REQUIRE_RELEASE_SECRETS: "1"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      X_FILE_UPDATER_PUBLIC_KEY: ${{ secrets.X_FILE_UPDATER_PUBLIC_KEY }}
      X_FILE_UPDATER_ENDPOINT: ${{ vars.X_FILE_UPDATER_ENDPOINT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 检查发布 secrets
        run: node scripts/check-desktop-release-secrets.mjs --platform windows --require-real-secrets

      - name: 构建共享包
        run: pnpm --filter @x-file/shared build

      - name: 构建 Web
        run: pnpm --filter @x-file/web build

      - name: 构建 Windows 安装包
        run: pnpm --filter @x-file/desktop tauri:build

      - name: 上传 Windows 构建产物
        if: ${{ inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: x-file-windows-tauri
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: error
